; GoldOSRS — PHP 8.4 settings for IONOS shared hosting (FastCGI / PHP-FPM)
; This file is read automatically by PHP-FPM on IONOS.
; Changes take effect within ~5 minutes (PHP-FPM cache TTL).

; ── Error handling ────────────────────────────────────────────────────────────
display_errors = Off
log_errors = On
error_log = logs/php_error.log
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Session security (PHP 8.4)
; NOTE: session.cookie_secure = 1 requires HTTPS to be active on the domain.
; On IONOS, free SSL (Let's Encrypt) is included — activate it in the IONOS
; Control Panel before deploying if you have not already done so.
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1
session.cookie_samesite = Lax

; ── Performance (within IONOS 768MB limit) ───────────────────────────────────
memory_limit = 256M
max_execution_time = 120
max_input_time = 60

; ── Upload / POST limits ─────────────────────────────────────────────────────
post_max_size = 16M
upload_max_filesize = 10M
max_input_vars = 1000

; ── Character encoding ───────────────────────────────────────────────────────
default_charset = UTF-8
mbstring.internal_encoding = UTF-8
